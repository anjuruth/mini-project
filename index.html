<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignAI — Sign Language Avatar</title>
    <meta name="description" content="Convert English text or voice to animated sign language gestures">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: rgba(18, 24, 42, 0.85);
            --border: rgba(99, 102, 241, 0.15);
            --primary: #818cf8;
            --primary-glow: #6366f1;
            --accent: #a78bfa;
            --success: #34d399;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #f87171;
            --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Animated background */
        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 600px 400px at 20% 20%, rgba(99,102,241,0.12), transparent),
                radial-gradient(ellipse 500px 500px at 80% 80%, rgba(167,139,250,0.08), transparent);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0%   { opacity: .7; transform: scale(1); }
            100% { opacity: 1;  transform: scale(1.05); }
        }

        .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 1.5rem; }

        /* Header */
        header {
            display: flex; align-items: center; gap: 14px;
            padding: 1rem 0 1.5rem;
        }
        .logo {
            width: 48px; height: 48px; border-radius: 14px;
            background: linear-gradient(135deg, var(--primary-glow), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; box-shadow: 0 4px 20px rgba(99,102,241,0.35);
        }
        header h1 {
            font-size: 1.6rem; font-weight: 700;
            background: linear-gradient(90deg, var(--text), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p { color: var(--text-muted); font-size: .85rem; margin-top: 2px; }

        /* Main layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        /* Card base */
        .card {
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,.25);
        }

        /* Avatar section */
        .avatar-section { text-align: center; }
        #avatar-canvas {
            width: 100%; max-width: 400px; height: 420px;
            border-radius: 14px;
            background: linear-gradient(180deg, #0f1629, #131b32);
            border: 1px solid var(--border);
        }
        .sign-label {
            margin-top: .75rem; font-size: 1.5rem; font-weight: 700;
            color: var(--primary); min-height: 2rem;
            transition: all .3s;
        }

        /* Gloss chips */
        .gloss-row {
            display: flex; flex-wrap: wrap; gap: .5rem;
            justify-content: center; min-height: 42px;
            margin-top: .75rem;
        }
        .gloss-chip {
            padding: 6px 14px; border-radius: 20px; font-size: .85rem; font-weight: 600;
            background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);
            color: var(--text-muted); transition: all .3s;
        }
        .gloss-chip.active {
            background: var(--primary-glow); color: #fff;
            border-color: var(--primary); box-shadow: 0 0 16px rgba(99,102,241,0.4);
            transform: scale(1.1);
        }
        .gloss-chip.done { color: var(--success); border-color: rgba(52,211,153,0.3); }

        /* Input section */
        .input-section {
            display: flex; gap: .75rem; align-items: stretch;
        }
        #text-input {
            flex: 1; padding: 14px 18px; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(15,22,41,0.8);
            color: var(--text); font-size: 1rem; font-family: inherit;
            outline: none; transition: border-color .3s;
        }
        #text-input:focus { border-color: var(--primary); }
        #text-input::placeholder { color: var(--text-muted); }

        .btn {
            padding: 14px 20px; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all .25s; font-family: inherit;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-glow), var(--accent));
            color: #fff; box-shadow: 0 4px 16px rgba(99,102,241,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(99,102,241,0.45); }
        .btn-mic {
            background: rgba(99,102,241,0.12); color: var(--primary);
            border: 1px solid rgba(99,102,241,0.25); font-size: 1.3rem; padding: 14px 16px;
        }
        .btn-mic:hover { background: rgba(99,102,241,0.2); }
        .btn-mic.recording {
            background: rgba(248,113,113,0.2); color: var(--danger);
            border-color: var(--danger); animation: micPulse 1s infinite;
        }
        @keyframes micPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.3); }
            50%     { box-shadow: 0 0 0 10px rgba(248,113,113,0); }
        }
        .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        /* Status */
        .status-bar {
            text-align: center; color: var(--text-muted); font-size: .85rem;
            padding: .5rem; min-height: 1.5rem;
        }

        /* Footer */
        footer {
            text-align: center; padding: 1.5rem 0; color: var(--text-muted); font-size: .8rem;
        }
        footer a { color: var(--primary); text-decoration: none; }

        @media (max-width: 600px) {
            .app { padding: 1rem; }
            header h1 { font-size: 1.3rem; }
            .input-section { flex-wrap: wrap; }
            #text-input { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="app">
        <header>
            <div class="logo">🤟</div>

            </div>

                    <input type="text" id="text-input" placeholder="Type an English sentence..." autocomplete="off">
                    <button class="btn btn-mic" id="mic-btn" title="Voice input"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>

/* =========================================================
   AVATAR RENDERER
   ========================================================= */
class SignAvatar {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.w = canvas.width;
        this.h = canvas.height;

        // Body fixed points
        this.headCenter = [200, 78];
        this.headR = 36;
        this.neckBase = [200, 132];
        this.lShoulder = [140, 155];
        this.rShoulder = [260, 155];
        this.waist = [200, 310];

        // Current animated joint positions
        this.joints = { ...P._IDLE };
        this.target = { ...P._IDLE };
        this.speed = 0.07;

        this._animating = true;
        this._loop();
    }

    setPose(name) {
        const pose = P[name] || P._IDLE;
        this.target = { ...pose };
    }

    _lerp(a, b, t) { return a + (b - a) * t; }

    _lerpArr(a, b, t) { return [this._lerp(a[0],b[0],t), this._lerp(a[1],b[1],t)]; }

    _update() {
        const t = this.speed;
        this.joints.le = this._lerpArr(this.joints.le, this.target.le, t);
        this.joints.lw = this._lerpArr(this.joints.lw, this.target.lw, t);
        this.joints.re = this._lerpArr(this.joints.re, this.target.re, t);
        this.joints.rw = this._lerpArr(this.joints.rw, this.target.rw, t);
        this.joints.lh = this.target.lh;
        this.joints.rh = this.target.rh;
    }

    _loop() {
        if (!this._animating) return;
        this._update();
        this._draw();
        requestAnimationFrame(() => this._loop());
    }

    _draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.w, this.h);

        const skin = '#D4A574';
        const skinDark = '#C4956A';
        const shirt = '#2D3566';
        const shirtLight = '#3A4580';

        // Body / torso
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(this.lShoulder[0]-8, this.lShoulder[1]);
        ctx.quadraticCurveTo(200, this.lShoulder[1]-10, this.rShoulder[0]+8, this.rShoulder[1]);
        ctx.lineTo(this.rShoulder[0]+20, this.waist[1]);
        ctx.quadraticCurveTo(200, this.waist[1]+15, this.lShoulder[0]-20, this.waist[1]);
        ctx.closePath();
        const tGrad = ctx.createLinearGradient(130, 155, 270, 310);
        tGrad.addColorStop(0, shirtLight);
        tGrad.addColorStop(1, shirt);
        ctx.fillStyle = tGrad;
        ctx.fill();
        ctx.restore();

        // Collar / neckline
        ctx.beginPath();
        ctx.moveTo(175, 142);
        ctx.quadraticCurveTo(200, 158, 225, 142);
        ctx.strokeStyle = '#252D52';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Arms
        this._drawArm(ctx, this.lShoulder, this.joints.le, this.joints.lw, shirt, skin);
        this._drawArm(ctx, this.rShoulder, this.joints.re, this.joints.rw, shirt, skin);

        // Hands
        this._drawHand(ctx, this.joints.lw, this.joints.lh, skin, skinDark);
        this._drawHand(ctx, this.joints.rw, this.joints.rh, skin, skinDark);

        // Neck
        ctx.beginPath();
        ctx.moveTo(188, 118);
        ctx.lineTo(212, 118);
        ctx.lineTo(215, 142);
        ctx.lineTo(185, 142);
        ctx.closePath();
        ctx.fillStyle = skin;
        ctx.fill();

        // Head
        ctx.beginPath();
        ctx.arc(this.headCenter[0], this.headCenter[1], this.headR, 0, Math.PI*2);
        const hGrad = ctx.createRadialGradient(195, 70, 5, 200, 78, 38);
        hGrad.addColorStop(0, '#E0B88A');
        hGrad.addColorStop(1, skin);
        ctx.fillStyle = hGrad;
        ctx.fill();

        // Hair
        ctx.beginPath();
        ctx.ellipse(200, 55, 40, 22, 0, Math.PI, 0);
        ctx.fillStyle = '#1a1a2e';
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(165, 72, 8, 20, 0.3, 0, Math.PI*2);
        ctx.fillStyle = '#1a1a2e';
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(235, 72, 8, 20, -0.3, 0, Math.PI*2);
        ctx.fillStyle = '#1a1a2e';
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath(); ctx.ellipse(186, 78, 4, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(214, 78, 4, 5, 0, 0, Math.PI*2); ctx.fill();
        // Eye shine
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(187, 76, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(215, 76, 1.5, 0, Math.PI*2); ctx.fill();

        // Eyebrows
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(180, 68); ctx.quadraticCurveTo(186, 65, 192, 68); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(208, 68); ctx.quadraticCurveTo(214, 65, 220, 68); ctx.stroke();

        // Nose & mouth
        ctx.strokeStyle = skinDark;
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(200, 82); ctx.lineTo(198, 90); ctx.stroke();
        ctx.strokeStyle = '#B8846A';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(192, 98); ctx.quadraticCurveTo(200, 103, 208, 98); ctx.stroke();
    }

    _drawArm(ctx, shoulder, elbow, wrist, clothColor, skinColor) {
        // Upper arm (clothed)
        ctx.beginPath();
        ctx.moveTo(shoulder[0], shoulder[1]);
        ctx.lineTo(elbow[0], elbow[1]);
        ctx.strokeStyle = clothColor;
        ctx.lineWidth = 18;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Forearm (skin)
        ctx.beginPath();
        ctx.moveTo(elbow[0], elbow[1]);
        ctx.lineTo(wrist[0], wrist[1]);
        ctx.strokeStyle = skinColor;
        ctx.lineWidth = 14;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Elbow joint
        ctx.beginPath();
        ctx.arc(elbow[0], elbow[1], 8, 0, Math.PI*2);
        ctx.fillStyle = skinColor;
        ctx.fill();
    }

    _drawHand(ctx, pos, shape, skin, skinDark) {
        const [x, y] = pos;
        ctx.save();

        if (shape === 'fist') {
            ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            ctx.strokeStyle = skinDark; ctx.lineWidth = 1; ctx.stroke();
        } else if (shape === 'point') {
            ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            ctx.strokeStyle = skinDark; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x, y-9); ctx.lineTo(x, y-22);
            ctx.stroke();
        } else if (shape === 'v') {
            ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            ctx.strokeStyle = skinDark; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x-4, y-9); ctx.lineTo(x-6, y-22); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x+4, y-9); ctx.lineTo(x+6, y-22); ctx.stroke();
        } else if (shape === 'pinch') {
            ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            ctx.strokeStyle = skinDark; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x, y-8); ctx.lineTo(x, y-16); ctx.stroke();
            ctx.beginPath(); ctx.arc(x, y-17, 2, 0, Math.PI*2); ctx.fill();
        } else if (shape === 'cup') {
            ctx.beginPath();
            ctx.ellipse(x, y, 11, 8, 0, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            ctx.strokeStyle = skinDark; ctx.lineWidth = 1; ctx.stroke();
        } else if (shape === 'claw') {
            ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            const offsets = [[-5,-8],[-2,-10],[2,-10],[5,-8]];
            ctx.strokeStyle = skinDark; ctx.lineWidth = 1.5;
            for (const [ox,oy] of offsets) {
                ctx.beginPath();ctx.moveTo(x+ox,y+oy);ctx.lineTo(x+ox*1.5,y+oy*1.6);ctx.stroke();
            }
        } else if (shape === 'hook') {
            ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            ctx.strokeStyle = skinDark; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x, y-9); ctx.quadraticCurveTo(x, y-18, x+6, y-15);
            ctx.stroke();
        } else if (shape === 'flat') {
            ctx.beginPath();
            ctx.ellipse(x, y-3, 12, 8, 0, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            ctx.strokeStyle = skinDark; ctx.lineWidth = 1; ctx.stroke();
        } else {
            // open / relaxed
            ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2);
            ctx.fillStyle = skin; ctx.fill();
            if (shape === 'open') {
                const fingers = [[-5,-9],[-2,-11],[2,-11],[5,-9],[7,-5]];
                ctx.strokeStyle = skinDark; ctx.lineWidth = 1.3;
                for (const [ox,oy] of fingers) {
                    ctx.beginPath();ctx.moveTo(x+ox,y+oy);ctx.lineTo(x+ox*1.6,y+oy*1.5);ctx.stroke();
                }
            }
        }
        ctx.restore();
    }

    destroy() { this._animating = false; }
}


/* =========================================================
   APP LOGIC
   ========================================================= */
document.addEventListener('DOMContentLoaded', () => {
    const canvas   = document.getElementById('avatar-canvas');
    const signLabel= document.getElementById('sign-label');
    const glossRow = document.getElementById('gloss-row');
    const textInput= document.getElementById('text-input');
    const sendBtn  = document.getElementById('send-btn');
    const micBtn   = document.getElementById('mic-btn');
    const statusBar= document.getElementById('status-bar');

    const avatar = new SignAvatar(canvas);
    let animationTimer = null;
    let isTranslating = false;

    // ── Translate ──
    async function translate(text) {
        if (!text.trim() || isTranslating) return;
        isTranslating = true;
        sendBtn.disabled = true;
        statusBar.textContent = 'Translating...';
        signLabel.textContent = '⏳';
        glossRow.innerHTML = '';

        try {
            const res = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text }),
            });
            const data = await res.json();
            if (data.error) { statusBar.textContent = data.error; return; }

            statusBar.textContent = `"${data.original_text}" → ${data.gloss.length} signs`;
            renderGlossChips(data.gloss);
            animateSigns(data.gloss);
        } catch (e) {
            statusBar.textContent = 'Error connecting to server';
            console.error(e);
        } finally {
            isTranslating = false;
            sendBtn.disabled = false;
        }
    }

    function renderGlossChips(gloss) {
        glossRow.innerHTML = '';
        gloss.forEach((word, i) => {
            const chip = document.createElement('span');
            chip.className = 'gloss-chip';
            chip.textContent = word;
            chip.id = `chip-${i}`;
            glossRow.appendChild(chip);
        });
    }

    function animateSigns(gloss) {
        if (animationTimer) clearTimeout(animationTimer);
        let i = 0;
        const SIGN_DURATION = 1800;

        function showNext() {
            if (i >= gloss.length) {
                signLabel.textContent = '✅ Done';
                avatar.setPose('_IDLE');
                // Mark all done
                document.querySelectorAll('.gloss-chip').forEach(c => c.classList.add('done'));
                return;
            }
            const word = gloss[i];
            signLabel.textContent = word;
            avatar.setPose(word);

            // Update chip highlights
            document.querySelectorAll('.gloss-chip').forEach(c => c.classList.remove('active'));
            const chip = document.getElementById(`chip-${i}`);
            if (chip) { chip.classList.add('active'); chip.scrollIntoView({behavior:'smooth',block:'nearest'}); }
            if (i > 0) {
                const prev = document.getElementById(`chip-${i-1}`);
                if (prev) prev.classList.add('done');
            }

            i++;
            animationTimer = setTimeout(showNext, SIGN_DURATION);
        }
        showNext();
    }

    // ── Event listeners ──
    sendBtn.addEventListener('click', () => translate(textInput.value));
    textInput.addEventListener('keydown', e => { if (e.key === 'Enter') translate(textInput.value); });

    // ── Web Speech API (mic) ──
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        let recognition = null;

        function createRecognition() {
            const r = new SpeechRecognition();
            r.lang = 'en-US';
            r.interimResults = false;
            r.continuous = false;
            r.maxAlternatives = 1;

            r.addEventListener('result', e => {
                const text = e.results[0][0].transcript;
                const confidence = Math.round(e.results[0][0].confidence * 100);
                textInput.value = text;
                statusBar.textContent = `Heard: "${text}" (${confidence}% confidence)`;
                micBtn.classList.remove('recording');
                translate(text);
            });

            r.addEventListener('speechend', () => {
                statusBar.textContent = 'Processing speech...';
            });

            r.addEventListener('end', () => {
                micBtn.classList.remove('recording');
            });

            r.addEventListener('error', e => {
                micBtn.classList.remove('recording');
                const msgs = {
                    'not-allowed': 'Microphone blocked! Click the lock icon in the address bar and allow microphone access, then try again.',
                    'no-speech': 'No speech detected. Please speak clearly and try again.',
                    'audio-capture': 'No microphone found. Please connect a microphone.',
                    'network': 'Network error. Speech recognition needs internet (Chrome sends audio to Google servers).',
                    'aborted': 'Listening cancelled.',
                    'service-not-allowed': 'Speech service not available. Make sure you are using Chrome or Edge browser.',
                };
                statusBar.textContent = msgs[e.error] || `Mic error: ${e.error}`;
                console.error('Speech Recognition Error:', e.error);
            });

            return r;
        }

        async function startMic() {
            // First request microphone permission explicitly
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Permission granted — stop the stream (SpeechRecognition manages its own)
                stream.getTracks().forEach(t => t.stop());
            } catch (err) {
                statusBar.textContent = 'Microphone access denied. Please allow microphone in browser settings.';
                console.error('getUserMedia error:', err);
                return;
            }

            // Create fresh instance each time (avoids stale state bugs)
            recognition = createRecognition();
            micBtn.classList.add('recording');
            statusBar.textContent = 'Listening... speak now!';

            try {
                recognition.start();
            } catch (err) {
                micBtn.classList.remove('recording');
                statusBar.textContent = 'Could not start microphone: ' + err.message;
                console.error('recognition.start() error:', err);
            }
        }

        micBtn.addEventListener('click', () => {
            if (micBtn.classList.contains('recording')) {
                if (recognition) recognition.stop();
                micBtn.classList.remove('recording');
                statusBar.textContent = 'Listening stopped.';
                return;
            }
            startMic();
        });
    } else {
        micBtn.disabled = true;
        micBtn.title = 'Speech recognition not supported — please use Chrome or Edge';
        statusBar.textContent = 'Voice input requires Chrome or Edge browser.';
    }
});
</script>
